<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT配置 | CarTest MQTT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 (与dashboard.html相同) -->
        <aside class="sidebar">
            <div class="logo"><h1>CarTest MQTT</h1></div>
            <ul class="nav-list">
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-gauge-high"></i>仪表盘</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-microchip"></i>传感器配置</a></li>
                <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-network-wired"></i>MQTT配置</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-flask-vial"></i>测试执行</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-database"></i>数据与结果</a></li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <div></div>
            </header>
            <div class="content-wrapper">
                <h2 class="page-title">MQTT Broker 配置</h2>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">连接设置</h3>
                        <div class="status-indicator">
                            <span class="status-dot status-online"></span>
                            <span>已连接到 Broker</span>
                        </div>
                    </div>
                    <form>
                        <div class="grid grid-cols-2">
                            <div class="form-group">
                                <label for="brokerHost" class="form-label">Broker 地址</label>
                                <input type="text" id="brokerHost" class="form-control" value="localhost">
                            </div>
                            <div class="form-group">
                                <label for="brokerPort" class="form-label">端口</label>
                                <input type="number" id="brokerPort" class="form-control" value="1883">
                            </div>
                            <div class="form-group">
                                <label for="clientId" class="form-label">客户端ID</label>
                                <input type="text" id="clientId" class="form-control" value="CarTest-Web-Client-12345">
                            </div>
                            <div class="form-group">
                                <label for="cleanSession" class="form-label">Clean Session</label>
                                <select id="cleanSession" class="form-control">
                                    <option value="true" selected>True</option>
                                    <option value="false">False</option>
                                </select>
                            </div>
                        </div>

                        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                            <h4 style="margin-bottom: 15px;">认证信息 (如需要)</h4>
                            <div class="grid grid-cols-2">
                                <div class="form-group">
                                    <label for="username" class="form-label">用户名</label>
                                    <input type="text" id="username" class="form-control" placeholder="可选">
                                </div>
                                <div class="form-group">
                                    <label for="password" class="form-label">密码</label>
                                    <input type="password" id="password" class="form-control" placeholder="可选">
                                </div>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px;">
                            <button type="button" class="btn btn-outline">测试连接</button>
                            <button type="button" class="btn btn-primary"><i class="fa-solid fa-save"></i> 保存并应用</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">主题 (Topic) 配置</h3>
                    </div>
                    <form>
                        <div class="form-group">
                            <label for="subscribeTopic" class="form-label">数据订阅主题</label>
                            <input type="text" id="subscribeTopic" class="form-control" value="vehicle/sensor/data/+" placeholder="使用 '+' 或 '#' 作为通配符">
                            <small style="color: var(--text-tertiary); margin-top: 5px; display: block;">测试系统将从此主题接收传感器数据。</small>
                        </div>
                        <div class="form-group">
                            <label for="publishTopic" class="form-label">指令发布主题 (示例)</label>
                            <input type="text" id="publishTopic" class="form-control" value="vehicle/test/command/{sensor_id}" disabled>
                            <small style="color: var(--text-tertiary); margin-top: 5px; display: block;">测试系统可从此主题向传感器发布控制指令。</small>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
