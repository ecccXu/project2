<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传感器配置 | CarTest MQTT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 (与dashboard.html相同) -->
        <aside class="sidebar">
            <div class="logo"><h1>CarTest MQTT</h1></div>
            <ul class="nav-list">
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-gauge-high"></i>仪表盘</a></li>
                <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-microchip"></i>传感器配置</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-network-wired"></i>MQTT配置</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-flask-vial"></i>测试执行</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-database"></i>数据与结果</a></li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <div></div>
            </header>
            <div class="content-wrapper">
                <h2 class="page-title">传感器配置</h2>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">模式选择</h3>
                    </div>
                    <div class="form-group">
                        <label class="form-label">数据来源模式</label>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="dataSource" value="simulation" checked style="margin-right: 8px;">
                                <span>Python 模拟模式</span>
                            </label>
                            <label style="display: flex; align-items: center; cursor: pointer; color: var(--text-tertiary);">
                                <input type="radio" name="dataSource" value="real" disabled style="margin-right: 8px;">
                                <span>真实传感器模式 (开发中)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">模拟参数配置</h3>
                        </div>
                        <form>
                            <div class="form-group">
                                <label for="sampleRate" class="form-label">数据采集频率 (秒)</label>
                                <input type="number" id="sampleRate" class="form-control" min="1" max="10" value="2">
                            </div>
                            <div class="form-group">
                                <label class="form-label">温度模拟范围</label>
                                <div style="display: flex; gap: 10px;">
                                    <input type="number" class="form-control" placeholder="最小值" value="-40" style="flex: 1;">
                                    <span style="align-self: center;">至</span>
                                    <input type="number" class="form-control" placeholder="最大值" value="85" style="flex: 1;">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">湿度模拟范围</label>
                                <div style="display: flex; gap: 10px;">
                                    <input type="number" class="form-control" placeholder="最小值" value="0" style="flex: 1;">
                                    <span style="align-self: center;">至</span>
                                    <input type="number" class="form-control" placeholder="最大值" value="100" style="flex: 1;">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">MQTT QoS 级别</label>
                                <select class="form-control">
                                    <option value="0">QoS 0 - 最多一次</option>
                                    <option value="1" selected>QoS 1 - 至少一次</option>
                                    <option value="2">QoS 2 - 恰好一次</option>
                                </select>
                            </div>
                            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                                <button type="button" class="btn btn-outline">重置</button>
                                <button type="button" class="btn btn-primary"><i class="fa-solid fa-save"></i> 保存配置</button>
                            </div>
                        </form>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">传感器列表</h3>
                            <button class="btn btn-outline"><i class="fa-solid fa-plus"></i> 添加传感器</button>
                        </div>
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>传感器ID</th>
                                        <th>类型</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>DHT11-001</td>
                                        <td>温湿度</td>
                                        <td><span class="tag tag-success">已启动</span></td>
                                        <td>
                                            <button class="btn btn-outline" style="padding: 4px 8px; font-size: 12px;">编辑</button>
                                            <button class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;">停止</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>DHT11-002</td>
                                        <td>温湿度</td>
                                        <td><span class="tag tag-default">已停止</span></td>
                                        <td>
                                            <button class="btn btn-outline" style="padding: 4px 8px; font-size: 12px;">编辑</button>
                                            <button class="btn btn-success" style="padding: 4px 8px; font-size: 12px;">启动</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
